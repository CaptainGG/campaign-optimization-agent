name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore backend/CampaignAgent.sln
      - name: Build
        run: dotnet build backend/CampaignAgent.sln --no-restore
      - name: Test
        run: dotnet test backend/CampaignAgent.sln --no-build

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install
        working-directory: frontend/dashboard
      - name: Build
        run: npm run build
        working-directory: frontend/dashboard
